<!DOCTYPE>
<html>
<head>
    <title>VAPE HUB</title>
    <style>
        .card {
            width: 250px;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            font-family: Arial;
        }
        .price {
            font-size: 24px;
            color: #ff5722;
            font-weight: bold;
        }
        button {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #128c7e;
        }

        .specs-hover {
            display: none;
            list-style: none;
            padding: 0;
            margin: 10px 0;
            font-size: 13px;
            text-align: left;
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .specs-hover li {
            padding: 4px 0;
            color: #444;
        }

        .card:hover .specs-hover {
            display: block;
        }

        .stock {
            font-size: 13px;
            font-weight: bold;
            margin: 8px 0;
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        .in-stock {
            background: #e6f4ea;
            color: #137333;
        }

        .low-stock {
            background: #fff3e0;
            color: #e67c1e;
        }

        .out-of-stock {
            background: #fce8e6;
            color: #c5221f;
        }

        .menu {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 30px;
        }

        .menu a {
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }

        .menu a:hover {
            color: #ff5722;
        }
    </style>
</head>

<div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
    <div class="card">
        <img src="images/SMOANT.jpg" alt="Smoant" width="200">
        <h3>SMOANT CHARON BABY POD Rainbow</h3>
        <p class="price">700₽</p>

        <ul class="specs-hover">

<script>
    function sendVKGroup (product, price) {
        let groupScreen = "vapehub12"; //id группы
        let message = `Здравствуйте! Хочу заказать ${product} за {price}₽`;
        let url = `https://vk.com/${groupScreen}?text=${encodeURIComponent(message)}`;
        window.open(url);
    }
    </script>
